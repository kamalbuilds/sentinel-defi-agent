version: "3.8"

services:
  sentinel:
    build: .
    container_name: sentinel-agent
    ports:
      - "3001:3001"
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
    labels:
      - "org.eigencloud.agent=sentinel-defi-guardian"
      - "org.eigencloud.tee=enabled"
